# Standalone compose for the bot only.
# Expects the backend to be reachable at BACKEND_URL (defaults to the
# host machine's gateway; override for production).

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:8080/api/v1}
      BACKEND_LOGIN: ${BACKEND_LOGIN:-admin@eventflats.uz}
      BACKEND_PASSWORD: ${BACKEND_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      # Lets Linux containers reach the host machine via host.docker.internal
      - "host.docker.internal:host-gateway"
