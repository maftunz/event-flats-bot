# Two bots from one image: same Dockerfile, different command + env vars.
# Override BACKEND_URL for production (point at the real backend host).

services:
  admin-bot:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "event_flats_bot.admin"]
    env_file: .env
    extra_hosts:
      # Lets Linux containers reach the host backend via host.docker.internal
      - "host.docker.internal:host-gateway"

  client-bot:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "event_flats_bot.client"]
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
